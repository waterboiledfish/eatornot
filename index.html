<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>吃了吗 - AI健康饮食助手</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; }
        .page { display: none; padding: 20px; }
        .page.active { display: block; }
        .container { max-width: 480px; margin: 0 auto; background: white; min-height: 100vh; padding: 20px; }
        h1 { text-align: center; color: #10B981; margin-bottom: 10px; font-size: 28px; }
        h2 { text-align: center; color: #333; margin-bottom: 20px; font-size: 18px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
        select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
        button { width: 100%; padding: 14px; background: #10B981; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; margin-top: 10px; }
        button:disabled { background: #ccc; }
        .link { text-align: center; margin-top: 15px; color: #10B981; cursor: pointer; }
        .error { color: red; text-align: center; margin-top: 10px; display: none; }
        .nav { display: flex; justify-content: space-around; padding: 15px; background: white; border-top: 1px solid #eee; position: fixed; bottom: 0; left: 0; right: 0; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #666; font-size: 12px; cursor: pointer; }
        .nav-item.active { color: #10B981; }
        .nav-icon { font-size: 24px; margin-bottom: 4px; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid #eee; margin-bottom: 20px; }
        .avatar { width: 40px; height: 40px; background: #10B981; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; cursor: pointer; }
        .upload-area { border: 2px dashed #ddd; border-radius: 12px; padding: 40px 20px; text-align: center; margin: 20px 0; cursor: pointer; }
        .upload-area:hover { border-color: #10B981; }
        .preview { max-width: 100%; border-radius: 8px; display: none; margin: 10px 0; }
        .result { background: #f9f9f9; padding: 15px; border-radius: 8px; margin-top: 15px; }
        .result h3 { color: #10B981; margin-bottom: 10px; font-size: 16px; }
        .result p { margin: 8px 0; color: #333; font-size: 14px; }
        .tag { display: inline-block; background: #10B981; color: white; padding: 4px 12px; border-radius: 12px; font-size: 12px; margin-right: 5px; }
        .tag.warning { background: #F59E0B; }
        .tag.danger { background: #EF4444; }
        .form-group { margin: 15px 0; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 500; }
        .checkbox-group { display: flex; flex-wrap: wrap; gap: 10px; }
        .checkbox-item { display: flex; align-items: center; gap: 5px; font-size: 14px; }
        .checkbox-item input { width: auto; margin: 0; }
        .loading { text-align: center; padding: 40px; color: #666; }
        .stat-card { flex: 1; background: #fef3c7; padding: 15px; border-radius: 12px; text-align: center; }
        .stat-card.blue { background: #dbeafe; }
    </style>
</head>
<body>
    <!-- 登录页面 -->
    <div id="login-page" class="page active">
        <div class="container">
            <h1>🍽️ 吃了吗</h1>
            <h2>登录您的健康饮食助手</h2>
            <input type="email" id="login-email" placeholder="邮箱地址">
            <input type="password" id="login-password" placeholder="密码">
            <button onclick="handleLogin()">登录</button>
            <p class="link" onclick="showRegister()">还没有账号？立即注册</p>
            <p class="error" id="login-error"></p>
        </div>
    </div>

    <!-- 注册页面 -->
    <div id="register-page" class="page">
        <div class="container">
            <h1>🍽️ 吃了吗</h1>
            <h2>创建账号</h2>
            <input type="email" id="register-email" placeholder="邮箱地址">
            <input type="password" id="register-password" placeholder="密码">
            <input type="password" id="register-confirm-password" placeholder="确认密码">
            <button onclick="handleRegister()">注册</button>
            <p class="link" onclick="showLogin()">已有账号？立即登录</p>
            <p class="error" id="register-error"></p>
        </div>
    </div>

    <!-- 首页 -->
    <div id="home-page" class="page">
        <div class="container">
            <div class="header">
                <div>
                    <h1 style="font-size: 22px;">今天吃什么？</h1>
                    <p style="color: #666; font-size: 14px;">上传食物照片，AI帮您分析</p>
                </div>
                <div class="avatar" id="user-avatar" onclick="logout()">U</div>
            </div>
            
            <div style="display: flex; gap: 15px; margin: 20px 0;">
                <div class="stat-card">
                    <div style="font-size: 24px;">🔥</div>
                    <div id="today-calories" style="font-size: 24px; font-weight: bold;">0</div>
                    <div style="font-size: 12px; color: #666;">今日热量</div>
                </div>
                <div class="stat-card blue">
                    <div style="font-size: 24px;">🍴</div>
                    <div id="today-meals" style="font-size: 24px; font-weight: bold;">0</div>
                    <div style="font-size: 12px; color: #666;">今日餐次</div>
                </div>
            </div>

            <div class="upload-area" onclick="document.getElementById('file-input').click()">
                <p>📷 点击上传食物照片</p>
                <p style="font-size: 12px; color: #999; margin-top: 5px;">支持 JPG、PNG 格式</p>
            </div>
            <input type="file" id="file-input" accept="image/*" style="display: none;" onchange="handleFileSelect(event)">
            <img id="preview" class="preview">
            <button id="analyze-btn" onclick="analyzeFood()" style="display: none;">🔍 开始AI分析</button>

            <div id="result-area" class="result" style="display: none;">
                <span class="tag" id="risk-tag">安全</span>
                <h3>🍱 识别食物</h3>
                <p id="foods-result">-</p>
                <h3>📊 营养估算</h3>
                <p id="nutrition-result">-</p>
                <h3>💡 饮食建议</h3>
                <p id="diet-result">-</p>
                <h3>🏃 生活建议</h3>
                <p id="life-result">-</p>
            </div>

            <div id="loading" class="loading" style="display: none;">
                <p>🤖 AI正在分析食物...</p>
                <p style="font-size: 12px; margin-top: 10px;">识别食材中，请稍候</p>
            </div>
        </div>

        <div class="nav">
            <div class="nav-item active" onclick="showNav('home')">
                <span class="nav-icon">🏠</span>
                <span>首页</span>
            </div>
            <div class="nav-item" onclick="showNav('history')">
                <span class="nav-icon">📋</span>
                <span>历史</span>
            </div>
            <div class="nav-item" onclick="showNav('profile')">
                <span class="nav-icon">👤</span>
                <span>档案</span>
            </div>
        </div>
    </div>

    <!-- 历史页面 -->
    <div id="history-page" class="page">
        <div class="container">
            <div class="header">
                <h1 style="font-size: 22px;">饮食历史</h1>
                <div class="avatar" onclick="logout()">U</div>
            </div>
            <div style="text-align: center; padding: 60px 0; color: #999;">
                <p style="font-size: 48px;">📋</p>
                <p>暂无记录</p>
                <p style="font-size: 12px;">上传您的第一张照片开始记录</p>
            </div>
        </div>
        <div class="nav">
            <div class="nav-item" onclick="showNav('home')">
                <span class="nav-icon">🏠</span>
                <span>首页</span>
            </div>
            <div class="nav-item active" onclick="showNav('history')">
                <span class="nav-icon">📋</span>
                <span>历史</span>
            </div>
            <div class="nav-item" onclick="showNav('profile')">
                <span class="nav-icon">👤</span>
                <span>档案</span>
            </div>
        </div>
    </div>

    <!-- 档案页面 -->
    <div id="profile-page" class="page">
        <div class="container">
            <div class="header">
                <h1 style="font-size: 22px;">个人健康档案</h1>
                <div class="avatar" onclick="logout()">U</div>
            </div>

            <div class="form-group">
                <label>基本信息</label>
                <input type="number" id="age" placeholder="年龄">
                <select id="gender">
                    <option value="">请选择性别</option>
                    <option value="男">男</option>
                    <option value="女">女</option>
                </select>
                <input type="number" id="height" placeholder="身高 (cm)">
                <input type="number" id="weight" placeholder="体重 (kg)">
            </div>

            <div class="form-group">
                <label>过敏史</label>
                <div class="checkbox-group">
                    <label class="checkbox-item"><input type="checkbox" value="花生"> 花生</label>
                    <label class="checkbox-item"><input type="checkbox" value="海鲜"> 海鲜</label>
                    <label class="checkbox-item"><input type="checkbox" value="牛奶"> 牛奶</label>
                    <label class="checkbox-item"><input type="checkbox" value="鸡蛋"> 鸡蛋</label>
                </div>
            </div>

            <div class="form-group">
                <label>疾病史与特殊状况</label>
                <div class="checkbox-group">
                    <label class="checkbox-item"><input type="checkbox" value="糖尿病"> 糖尿病</label>
                    <label class="checkbox-item"><input type="checkbox" value="高血压"> 高血压</label>
                    <label class="checkbox-item"><input type="checkbox" value="高血脂"> 高血脂</label>
                    <label class="checkbox-item"><input type="checkbox" value="痛风"> 痛风</label>
                </div>
            </div>

            <button onclick="saveProfile()">💾 保存档案</button>
        </div>
        <div class="nav">
            <div class="nav-item" onclick="showNav('home')">
                <span class="nav-icon">🏠</span>
                <span>首页</span>
            </div>
            <div class="nav-item" onclick="showNav('history')">
                <span class="nav-icon">📋</span>
                <span>历史</span>
            </div>
            <div class="nav-item active" onclick="showNav('profile')">
                <span class="nav-icon">👤</span>
                <span>档案</span>
            </div>
        </div>
        <script>
        let currentUser = null;
        let selectedImage = null;

        function checkLogin() {
            const saved = localStorage.getItem('chilema_user');
            if (saved) {
                currentUser = JSON.parse(saved);
                showPage('home');
                loadUserData();
            }
        }

        function showPage(page) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(page + '-page').classList.add('active');
        }

        function showRegister() { showPage('register'); }
        function showLogin() { showPage('login'); }

        function handleLogin() {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const errorEl = document.getElementById('login-error');

            if (!email || !password) {
                errorEl.textContent = '请输入邮箱和密码';
                errorEl.style.display = 'block';
                return;
            }

            fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: email, password: password })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    currentUser = { email: email };
                    localStorage.setItem('chilema_user', JSON.stringify(currentUser));
                    showPage('home');
                    loadUserData();
                } else {
                    errorEl.textContent = data.error || '登录失败';
                    errorEl.style.display = 'block';
                }
            })
            .catch(err => {
                errorEl.textContent = '登录失败，请稍后重试';
                errorEl.style.display = 'block';
            });
        }

        function handleRegister() {
            const email = document.getElementById('register-email').value;
            const password = document.getElementById('register-password').value;
            const confirmPassword = document.getElementById('register-confirm-password').value;
            const errorEl = document.getElementById('register-error');

            if (!email || !password) {
                errorEl.textContent = '请输入邮箱和密码';
                errorEl.style.display = 'block';
                return;
            }

            if (password !== confirmPassword) {
                errorEl.textContent = '两次输入的密码不一致';
                errorEl.style.display = 'block';
                return;
            }

            fetch('/api/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: email, password: password })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    currentUser = { email: email };
                    localStorage.setItem('chilema_user', JSON.stringify(currentUser));
                    showPage('home');
                } else {
                    errorEl.textContent = data.error || '注册失败';
                    errorEl.style.display = 'block';
                }
            })
            .catch(err => {
                errorEl.textContent = '注册失败，请稍后重试';
                errorEl.style.display = 'block';
            });
        }

        function logout() {
            if (confirm('确定要退出登录吗？')) {
                localStorage.removeItem('chilema_user');
                currentUser = null;
                showPage('login');
            }
        }

        function loadUserData() {
            if (!currentUser) return;
            document.getElementById('user-avatar').textContent = currentUser.email.charAt(0).toUpperCase();
            
            fetch('/api/get-health-data?username=' + encodeURIComponent(currentUser.email))
            .then(res => res.json())
            .then(data => {
                if (data && Object.keys(data).length > 0) {
                    document.getElementById('age').value = data.age || '';
                    document.getElementById('gender').value = data.gender || '';
                    document.getElementById('height').value = data.height || '';
                    document.getElementById('weight').value = data.weight || '';
                }
            })
            .catch(err => console.log('获取数据失败'));
        }

        function saveProfile() {
            if (!currentUser) return;

            const age = document.getElementById('age').value;
            const gender = document.getElementById('gender').value;
            const height = document.getElementById('height').value;
            const weight = document.getElementById('weight').value;

            const allergies = [];
            document.querySelectorAll('#profile-page input[type="checkbox"]:checked').forEach(cb => {
                allergies.push(cb.value);
            });

            fetch('/api/save-health-data', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    username: currentUser.email,
                    age, gender, height, weight, allergies
                })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    alert('档案保存成功！');
                }
            });
        }

        function showNav(page) { showPage(page + '-page'); }

        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                selectedImage = e.target.result;
                document.getElementById('preview').src = selectedImage;
                document.getElementById('preview').style.display = 'block';
                document.getElementById('analyze-btn').style.display = 'block';
            };
            reader.readAsDataURL(file);
        }

        function analyzeFood() {
            if (!selectedImage) {
                alert('请先选择图片');
                return;
            }

            document.getElementById('loading').style.display = 'block';
            document.getElementById('result-area').style.display = 'none';

            fetch('/api/analyze-food', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ image: selectedImage })
            })
            .then(res => res.json())
            .then(data => {
                document.getElementById('loading').style.display = 'none';
                
                if (data.foods) {
                    document.getElementById('foods-result').textContent = data.foods.join('、');
                    document.getElementById('nutrition-result').textContent = 
                        '热量: ' + (data.nutrition?.calories || '-') + ' kcal | 蛋白质: ' + (data.nutrition?.protein || '-') + 'g | 碳水: ' + (data.nutrition?.carbs || '-') + 'g | 脂肪: ' + (data.nutrition?.fat || '-') + 'g';
                    document.getElementById('diet-result').textContent = data.dietSuggestions?.join('；') || '-';
                    document.getElementById('life-result').textContent = data.lifeSuggestions?.join('；') || '-';
                    
                    const tag = document.getElementById('risk-tag');
                    tag.textContent = data.riskMessage || '安全';
                    tag.className = 'tag';
                    if (data.riskLevel === 'warning') tag.classList.add('warning');
                    if (data.riskLevel === 'danger') tag.classList.add('danger');
                    
                    document.getElementById('result-area').style.display = 'block';
                    
                    const cal = parseInt(document.getElementById('today-calories').textContent);
                    document.getElementById('today-calories').textContent = cal + (data.nutrition?.calories || 0);
                    const meals = parseInt(document.getElementById('today-meals').textContent);
                    document.getElementById('today-meals').textContent = meals + 1;
                }
            })
            .catch(err => {
                document.getElementById('loading').style.display = 'none';
                alert('分析失败，请重试');
            });
        }

        checkLogin();
    </script>
</body>
</html>
    </div>
